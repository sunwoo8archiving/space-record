<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dongbuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <button class="site-title" data-view="gallery" type="button">Dongbuk</button>
    <nav class="site-nav">
      <button data-view="info" type="button">Info</button>
      <button data-view="index" type="button">Index</button>
    </nav>
  </header>

  <main>
    <section id="view-gallery" class="view view-gallery">
      <div class="drag-stage" id="drag-stage">
        <img id="gallery-image" src="" alt="" draggable="false">
      </div>
      <div class="counter" id="counter"></div>
    </section>

    <section id="view-index" class="view view-index" hidden>
      <div class="index-grid" id="index-grid"></div>
    </section>

    <section id="view-info" class="view view-info" hidden>
      <p>Dongbuk 프로젝트 소개 텍스트를 여기에 작성하세요.</p>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
