<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dongbuk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="viewer-tabs" id="viewer-tabs">
      <button data-type="spaceship" type="button">우주선</button>
      <button data-type="spacesuit" type="button">우주복</button>
    </div>
    <nav class="site-nav">
      <button data-view="info" data-label="Info" type="button">Info</button>
    </nav>
  </header>

  <main>
    <section id="view-gallery" class="view view-gallery">
      <div class="viewer-marquee" id="viewer-marquee">
        <div class="viewer-marquee-track" id="viewer-marquee-track"></div>
      </div>
      <div class="drag-stage" id="drag-stage">
        <img id="gallery-image" src="" alt="" draggable="false">
      </div>
      <div class="viewer-caption">
        <span id="viewer-student"></span>
      </div>
      <div class="counter" id="counter"></div>
    </section>

    <section id="view-info" class="view view-info" hidden>
      <button class="view-close" id="info-close" type="button" aria-label="Close">&times;</button>
      <p>Dongbuk 프로젝트 소개 텍스트를 여기에 작성하세요.</p>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close">&times;</button>
      <div class="modal-images">
        <img id="modal-image-1" src="" alt="">
        <img id="modal-image-2" src="" alt="">
      </div>
      <div class="modal-text" id="modal-text"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
